<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 cut & play · clean embed + keyboard</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #0b0f18 0%, #1a1f2c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .card {
            background: rgba(18, 22, 33, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.7);
            width: 1000px;
            max-width: 98vw;
        }
        h1 {
            color: #f3e9c0;
            font-size: 2rem;
            margin: 0 0 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        h1 span {
            background: #9f7e1f;
            font-size: 0.9rem;
            padding: 0.15rem 1rem;
            border-radius: 40px;
            color: #0e0b1a;
        }
        .sub {
            color: #aca9bb;
            margin-bottom: 1.5rem;
            border-left: 3px solid #f5c542;
            padding-left: 1rem;
        }
        
        /* Preview row – both containers have clean embed (no title/controls) */
        .preview-row {
            display: flex;
            gap: 16px;
            margin-bottom: 1.5rem;
        }
        .preview-container {
            flex: 1;
            background: #0c0f16;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #3f3d52;
            aspect-ratio: 9 / 16;
            position: relative;
        }
        /* video elements: no controls, hide any title/branding (none exists natively) */
        #preview, #playbackPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #171b24;
            display: block;
            pointer-events: none;  /* keeps overlay clean – but we need play/pause via keyboard */
        }
        /* allow pointer events only on container if needed, but video itself no overlay */
        .preview-container {
            pointer-events: none;   /* so clicks don't trigger video controls (they are hidden anyway) */
        }
        /* but we still want keyboard to work – fine */
        .preview-label {
            position: absolute;
            bottom: 8px;
            right: 16px;
            background: #00000080;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid #b58f3a;
            z-index: 5;
            font-size: 0.8rem;
            pointer-events: none;
        }
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 7rem;
            font-weight: 900;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 1.5rem;
            pointer-events: none;
        }
        .countdown-overlay.visible {
            opacity: 1;
        }
        
        /* Timeline editor */
        .timeline-section {
            background: #1a1e2b;
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid #4a4553;
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            color: #e2d5b6;
            margin-bottom: 1rem;
        }
        .cut-badge {
            background: #c44545;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }
        
        /* Timeline track */
        .timeline-track {
            position: relative;
            height: 60px;
            background: #0f1322;
            border-radius: 40px;
            border: 1px solid #5f5a6b;
            margin: 20px 0;
            cursor: pointer;
        }
        .timeline-fill {
            position: absolute;
            height: 100%;
            background: #f5c54233;
            border-radius: 40px;
            pointer-events: none;
        }
        .timeline-handle {
            position: absolute;
            width: 16px;
            height: 70px;
            top: -5px;
            transform: translateX(-50%);
            cursor: ew-resize;
            z-index: 30;
        }
        .handle-line {
            width: 4px;
            height: 70px;
            background: #f5c542;
            margin: 0 auto;
            border-radius: 4px;
        }
        .handle-circle {
            width: 24px;
            height: 24px;
            background: white;
            border: 3px solid #f5c542;
            border-radius: 50%;
            margin: -12px auto 0;
        }
        .start-handle .handle-circle {
            background: #4ae07a;
            border-color: #2ecc71;
        }
        .end-handle .handle-circle {
            background: #e06a4a;
            border-color: #e74c3c;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            color: #9f9bb5;
            margin-bottom: 0.5rem;
        }
        .cut-values {
            display: flex;
            gap: 20px;
            justify-content: center;
            color: #cfc7ae;
        }
        .cut-values span {
            background: #2b3040;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
        }
        
        /* Playback controls (buttons + keyboard hints) */
        .playback-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .playback-btn {
            background: #323a4b;
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
        }
        .playback-btn:hover {
            background: #3f485e;
        }
        .key-hint {
            background: #1f2533;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #f5c542;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        
        .controls {
            display: flex;
            gap: 0.75rem;
            margin: 1.2rem 0;
        }
        button {
            background: #272b3a;
            border: none;
            color: #e9e1c7;
            font-size: 1.1rem;
            padding: 0.8rem 1.8rem;
            border-radius: 2.5rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d0f17;
            border: 1px solid #5b5340;
            flex: 1;
            justify-content: center;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0d0f17;
        }
        button:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            pointer-events: none;
        }
        .record-btn {
            background: #8b2a2a;
            border-color: #c97c4b;
            color: white;
        }
        .download-btn {
            background: #2d5a3b;
            border-color: #64b07b;
        }
        
        .info-row {
            background: #1b1f2b;
            border-radius: 3rem;
            padding: 0.7rem 1.5rem;
            display: flex;
            justify-content: space-between;
            color: #cbc5b2;
            border: 1px solid #47423b;
        }
        .badge {
            background: #323a4b;
            padding: 0.35rem 1rem;
            border-radius: 3rem;
            color: #ffdb8e;
        }
        .progress {
            height: 6px;
            background: #2a2e3c;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #f5c542;
            transition: width 0.2s;
        }
        .legend {
            margin-top: 0.8rem;
            text-align: center;
            color: #8f8ba3;
            font-size: 0.8rem;
        }
        .legend kbd {
            background: #2a2e3f;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            color: #f5c542;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎬 clean cuts <span>keyboard + hide titles</span></h1>
        <div class="sub">▼ <kbd>space</kbd> pause · <kbd>←</kbd>/<kbd>→</kbd> step · <kbd>s</kbd>/<kbd>w</kbd> speed · <kbd>+</kbd>/<kbd>-</kbd> quality </div>

        <div class="preview-row">
            <div class="preview-container">
                <!-- no controls, no title (just camera) -->
                <video id="preview" autoplay playsinline muted></video>
                <div class="countdown-overlay" id="countdownOverlay">5</div>
                <div class="preview-label">live cam (clean)</div>
            </div>
            <div class="preview-container">
                <!-- playback video: no controls, no title, no branding -->
                <video id="playbackPreview" playsinline></video>
                <div class="preview-label">cut preview (clean)</div>
            </div>
        </div>

        <!-- Timeline section (hidden until recording exists) -->
        <div class="timeline-section" id="timelineSection" style="display: none;">
            <div class="timeline-header">
                <span>✂️ drag handles to cut</span>
                <span class="cut-badge" id="cutRange">0:00 – 0:00</span>
            </div>
            
            <div class="playback-controls">
                <button class="playback-btn" id="playBtn">▶️ Play</button>
                <button class="playback-btn" id="pauseBtn">⏸️ Pause <span class="key-hint">space</span></button>
                <button class="playback-btn" id="resetBtn">↺ Reset</button>
            </div>
            
            <!-- Timeline track -->
            <div class="timeline-track" id="timelineTrack">
                <div class="timeline-fill" id="timelineFill" style="left: 0%; width: 100%;"></div>
                
                <!-- Start handle -->
                <div class="timeline-handle start-handle" id="startHandle" style="left: 0%;">
                    <div class="handle-line"></div>
                    <div class="handle-circle"></div>
                </div>
                
                <!-- End handle -->
                <div class="timeline-handle end-handle" id="endHandle" style="left: 100%;">
                    <div class="handle-line"></div>
                    <div class="handle-circle"></div>
                </div>
            </div>
            
            <div class="time-display">
                <span id="startLabel">0:00</span>
                <span id="endLabel">0:00</span>
            </div>
            
            <div class="cut-values">
                <span>start: <span id="startValue">0.0s</span></span>
                <span>end: <span id="endValue">0.0s</span></span>
            </div>
        </div>

        <div class="controls">
            <button class="record-btn" id="startBtn">🔴 Start Recording</button>
            <button class="stop-btn" id="stopBtn" disabled>⏹️ Stop</button>
            <button class="download-btn" id="downloadBtn" disabled>💾 Download Cut</button>
        </div>

        <div class="progress" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="info-row">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span class="badge" id="status">⏸️ idle</span>
        </div>
        <div class="legend">
            <kbd>←</kbd> step back 1s · <kbd>→</kbd> step forward 1s · <kbd>s</kbd> speed+ · <kbd>w</kbd> speed- · <kbd>+</kbd> quality+ · <kbd>-</kbd> quality-
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const previewVideo = document.getElementById('preview');
            const playbackVideo = document.getElementById('playbackPreview');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const timerSpan = document.getElementById('timer');
            const statusSpan = document.getElementById('status');
            const countdownOverlay = document.getElementById('countdownOverlay');
            
            // Timeline elements
            const timelineSection = document.getElementById('timelineSection');
            const timelineTrack = document.getElementById('timelineTrack');
            const startHandle = document.getElementById('startHandle');
            const endHandle = document.getElementById('endHandle');
            const timelineFill = document.getElementById('timelineFill');
            const startLabel = document.getElementById('startLabel');
            const endLabel = document.getElementById('endLabel');
            const startValue = document.getElementById('startValue');
            const endValue = document.getElementById('endValue');
            const cutRange = document.getElementById('cutRange');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');

            // State
            let mediaStream = null;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingStartTime = 0;
            let timerInterval = null;
            
            // Countdown
            let countdownInterval = null;
            let countdownValue = 5;
            let isCountdownActive = false;
            
            // Video data
            let recordedBlob = null;
            let recordedUrl = null;
            let videoDuration = 0;
            
            // Cut range (0-1)
            let cutStart = 0;
            let cutEnd = 1;
            
            // Dragging
            let activeHandle = null;
            let isDragging = false;

            // playback speed & quality simulation (quality changes bitrate on next download)
            let playbackSpeed = 1.0;
            let qualityLevel = 100; // percent bitrate

            // Format time
            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            function formatSeconds(sec) {
                if (!sec || isNaN(sec)) return '0.0s';
                return sec.toFixed(1) + 's';
            }

            // Timer functions
            function updateTimer() {
                if (!recordingStartTime) return;
                const elapsed = (Date.now() - recordingStartTime) / 1000;
                timerSpan.textContent = formatTime(elapsed);
            }

            function startTimer() {
                stopTimer();
                recordingStartTime = Date.now();
                timerSpan.textContent = '0:00';
                timerInterval = setInterval(updateTimer, 200);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                recordingStartTime = 0;
            }

            // Stop all tracks
            function stopAllTracks() {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }
                previewVideo.srcObject = null;
            }

            function stopCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                countdownOverlay.classList.remove('visible');
                isCountdownActive = false;
            }

            // Update UI for recording state
            function setUiForRecording(recording) {
                if (recording) {
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    downloadBtn.disabled = true;
                    statusSpan.innerHTML = '🔴 recording';
                    timelineSection.style.display = 'none';
                } else {
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    downloadBtn.disabled = recordedChunks.length === 0;
                    statusSpan.innerHTML = recordedChunks.length ? '⏸️ ready' : '⏹️ idle';
                    
                    if (recordedChunks.length > 0) {
                        loadVideoForPreview();
                    }
                }
            }

            // Load recorded video for preview
            function loadVideoForPreview() {
                if (recordedUrl) {
                    URL.revokeObjectURL(recordedUrl);
                }
                
                recordedBlob = new Blob(recordedChunks, { type: 'video/webm' });
                recordedUrl = URL.createObjectURL(recordedBlob);
                playbackVideo.src = recordedUrl;
                
                playbackVideo.onloadedmetadata = () => {
                    videoDuration = playbackVideo.duration;
                    console.log('Video loaded, duration:', videoDuration);
                    
                    // Reset cuts
                    cutStart = 0;
                    cutEnd = 1;
                    
                    // Update timeline
                    updateTimeline();
                    timelineSection.style.display = 'block';
                    
                    // Set video to start
                    playbackVideo.currentTime = 0;
                };
                
                playbackVideo.load();
            }

            // Update timeline UI
            function updateTimeline() {
                if (!videoDuration) return;
                
                // Update handle positions
                startHandle.style.left = (cutStart * 100) + '%';
                endHandle.style.left = (cutEnd * 100) + '%';
                
                // Update fill between handles
                timelineFill.style.left = (cutStart * 100) + '%';
                timelineFill.style.width = ((cutEnd - cutStart) * 100) + '%';
                
                // Update time labels
                const startSec = cutStart * videoDuration;
                const endSec = cutEnd * videoDuration;
                
                startLabel.textContent = formatTime(startSec);
                endLabel.textContent = formatTime(endSec);
                startValue.textContent = formatSeconds(startSec);
                endValue.textContent = formatSeconds(endSec);
                cutRange.textContent = `${formatTime(startSec)} – ${formatTime(endSec)}`;
            }

            // Handle drag start
            function startDrag(handle, e) {
                e.preventDefault();
                activeHandle = handle;
                isDragging = true;
                
                function onMouseMove(e) {
                    if (!isDragging || !videoDuration) return;
                    
                    const rect = timelineTrack.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    let percent = x / rect.width;
                    
                    if (activeHandle === 'start') {
                        cutStart = Math.min(percent, cutEnd - 0.01);
                    } else {
                        cutEnd = Math.max(percent, cutStart + 0.01);
                    }
                    
                    updateTimeline();
                }
                
                function onMouseUp() {
                    isDragging = false;
                    activeHandle = null;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            // Attach drag handlers
            startHandle.addEventListener('mousedown', (e) => startDrag('start', e));
            endHandle.addEventListener('mousedown', (e) => startDrag('end', e));

            // Playback controls
            playBtn.addEventListener('click', () => {
                if (!playbackVideo || !videoDuration) return;
                
                // If at or past end, restart from start
                if (playbackVideo.currentTime >= cutEnd * videoDuration) {
                    playbackVideo.currentTime = cutStart * videoDuration;
                }
                
                playbackVideo.playbackRate = playbackSpeed;
                playbackVideo.play().catch(e => console.log('Playback error:', e));
            });

            pauseBtn.addEventListener('click', () => {
                if (!playbackVideo) return;
                playbackVideo.pause();
            });

            resetBtn.addEventListener('click', () => {
                if (!playbackVideo) return;
                playbackVideo.currentTime = cutStart * videoDuration;
                playbackVideo.pause();
            });

            // Monitor playback to stop at cut end
            playbackVideo.addEventListener('timeupdate', () => {
                if (!videoDuration) return;
                
                if (playbackVideo.currentTime >= cutEnd * videoDuration) {
                    playbackVideo.pause();
                    playbackVideo.currentTime = cutStart * videoDuration;
                }
            });

            // Start recording process
            async function startRecording() {
                recordedChunks = [];
                downloadBtn.disabled = true;
                stopAllTracks();
                stopCountdown();
                progressContainer.style.display = 'none';
                timelineSection.style.display = 'none';
                
                if (recordedUrl) {
                    URL.revokeObjectURL(recordedUrl);
                    recordedUrl = null;
                }

                try {
                    const displayStream = await navigator.mediaDevices.getDisplayMedia({
                        video: true,
                        audio: true,
                    });

                    let micStream = null;
                    try {
                        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    } catch (e) {}

                    const audioTracks = [];
                    displayStream.getAudioTracks().forEach(t => audioTracks.push(t));
                    if (micStream) micStream.getAudioTracks().forEach(t => audioTracks.push(t));

                    const videoTrack = displayStream.getVideoTracks()[0];
                    
                    const finalStream = audioTracks.length 
                        ? new MediaStream([videoTrack, ...audioTracks])
                        : displayStream;

                    mediaStream = finalStream;
                    previewVideo.srcObject = mediaStream;

                    videoTrack.onended = () => {
                        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                            mediaRecorder.stop();
                        }
                        stopAllTracks();
                        stopCountdown();
                        setUiForRecording(false);
                    };

                    startCountdown();

                } catch (err) {
                    console.error(err);
                    statusSpan.innerHTML = '⚠️ cancelled';
                    setUiForRecording(false);
                }
            }

            function startCountdown() {
                stopCountdown();
                countdownValue = 5;
                countdownOverlay.textContent = countdownValue;
                countdownOverlay.classList.add('visible');
                isCountdownActive = true;

                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusSpan.innerHTML = '⏳ recording in 5...';

                countdownInterval = setInterval(() => {
                    countdownValue -= 1;
                    countdownOverlay.textContent = countdownValue;

                    if (countdownValue <= 0) {
                        stopCountdown();
                        
                        try {
                            mediaRecorder = new MediaRecorder(mediaStream, {
                                mimeType: 'video/webm;codecs=vp8,opus',
                                videoBitsPerSecond: 25000000,
                            });

                            mediaRecorder.ondataavailable = (e) => {
                                if (e.data.size > 0) recordedChunks.push(e.data);
                            };

                            mediaRecorder.onstop = () => {
                                stopTimer();
                                setUiForRecording(false);
                            };

                            mediaRecorder.start(5000);
                            startTimer();
                            setUiForRecording(true);
                            statusSpan.innerHTML = '🔴 recording';

                        } catch (e) {
                            console.error(e);
                            statusSpan.innerHTML = '⚠️ recorder error';
                        }
                    }
                }, 1000);
            }

            function stopAction() {
                if (isCountdownActive) {
                    stopCountdown();
                    statusSpan.innerHTML = '⏸️ cancelled';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                } else if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            }

            // Download with cut (simulate quality by scaling bitrate)
            function downloadCut() {
                if (!recordedChunks.length) return;

                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                statusSpan.innerHTML = '⏳ processing cut...';
                downloadBtn.disabled = true;

                const originalBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(originalBlob);
                
                const video = document.createElement('video');
                video.src = url;
                video.muted = true;
                
                video.onloadedmetadata = () => {
                    const startSec = cutStart * video.duration;
                    const endSec = cutEnd * video.duration;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = 1080;
                    canvas.height = 1920;
                    const ctx = canvas.getContext('2d');
                    
                    const canvasStream = canvas.captureStream(30);
                    const audioStream = video.captureStream();
                    const audioTracks = audioStream.getAudioTracks();
                    
                    const finalStream = new MediaStream();
                    finalStream.addTrack(canvasStream.getVideoTracks()[0]);
                    audioTracks.forEach(t => finalStream.addTrack(t));
                    
                    // Use qualityLevel to adjust bitrate (simulate + / -)
                    let bitrate = Math.floor(20000000 * (qualityLevel / 100));
                    bitrate = Math.max(1000000, Math.min(50000000, bitrate)); // clamp
                    
                    const finalRecorder = new MediaRecorder(finalStream, {
                        mimeType: 'video/webm;codecs=vp8,opus',
                        videoBitsPerSecond: bitrate,
                    });
                    
                    const outputChunks = [];
                    finalRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) outputChunks.push(e.data);
                    };
                    
                    finalRecorder.onstop = () => {
                        const outputBlob = new Blob(outputChunks, { type: 'video/webm' });
                        const outputUrl = URL.createObjectURL(outputBlob);
                        const a = document.createElement('a');
                        a.href = outputUrl;
                        a.download = `cut_${qualityLevel}q_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.webm`;
                        a.click();
                        
                        URL.revokeObjectURL(outputUrl);
                        URL.revokeObjectURL(url);
                        progressContainer.style.display = 'none';
                        statusSpan.innerHTML = '✅ download complete';
                        downloadBtn.disabled = false;
                    };
                    
                    finalRecorder.start();
                    
                    video.currentTime = startSec;
                    video.play();
                    
                    function drawFrame() {
                        if (video.paused || video.ended || video.currentTime >= endSec) {
                            if (finalRecorder.state !== 'inactive') finalRecorder.stop();
                            return;
                        }
                        
                        const progress = ((video.currentTime - startSec) / (endSec - startSec)) * 100;
                        progressBar.style.width = progress + '%';
                        
                        ctx.clearRect(0, 0, 1080, 1920);
                        
                        const vw = video.videoWidth;
                        const vh = video.videoHeight;
                        const targetAspect = 9/16;
                        const videoAspect = vw / vh;
                        
                        let drawWidth, drawHeight, offsetX = 0, offsetY = 0;
                        
                        if (videoAspect > targetAspect) {
                            drawHeight = vh;
                            drawWidth = vh * targetAspect;
                            offsetX = (vw - drawWidth) / 2;
                        } else {
                            drawWidth = vw;
                            drawHeight = vw / targetAspect;
                            offsetY = (vh - drawHeight) / 2;
                        }
                        
                        ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight, 0, 0, 1080, 1920);
                        
                        requestAnimationFrame(drawFrame);
                    }
                    
                    requestAnimationFrame(drawFrame);
                };
                
                video.load();
            }

            // ---------- KEYBOARD COMMANDS ----------
            window.addEventListener('keydown', (e) => {
                // ignore if typing in any (no input fields, but safe)
                const tag = e.target.tagName.toLowerCase();
                if (tag === 'input' || tag === 'textarea' || tag === 'button') return;

                // pause on command (spacebar)
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (playbackVideo) playbackVideo.pause();
                }
                // < go back (left arrow) - move 1 sec back
                else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (playbackVideo && videoDuration) {
                        playbackVideo.currentTime = Math.max(0, playbackVideo.currentTime - 1);
                    }
                }
                // > go forward (right arrow) - move 1 sec forward, capped at end
                else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (playbackVideo && videoDuration) {
                        playbackVideo.currentTime = Math.min(videoDuration, playbackVideo.currentTime + 1);
                    }
                }
                // s speed up
                else if (e.key === 's' || e.key === 'S') {
                    e.preventDefault();
                    playbackSpeed = Math.min(3, playbackSpeed + 0.25);
                    if (playbackVideo) playbackVideo.playbackRate = playbackSpeed;
                    statusSpan.innerHTML = `⚡ speed ${playbackSpeed.toFixed(2)}x`;
                }
                // w slow down
                else if (e.key === 'w' || e.key === 'W') {
                    e.preventDefault();
                    playbackSpeed = Math.max(0.25, playbackSpeed - 0.25);
                    if (playbackVideo) playbackVideo.playbackRate = playbackSpeed;
                    statusSpan.innerHTML = `🐢 speed ${playbackSpeed.toFixed(2)}x`;
                }
                // + 100+ quality
                else if (e.key === '+' || e.key === '=') {
                    e.preventDefault();
                    qualityLevel = Math.min(200, qualityLevel + 10);
                    statusSpan.innerHTML = `⬆️ quality ${qualityLevel}%`;
                }
                // - 100- quality
                else if (e.key === '-' || e.key === '_') {
                    e.preventDefault();
                    qualityLevel = Math.max(20, qualityLevel - 10);
                    statusSpan.innerHTML = `⬇️ quality ${qualityLevel}%`;
                }
            });

            // Event listeners
            startBtn.addEventListener('click', startRecording);
            stopBtn.addEventListener('click', stopAction);
            downloadBtn.addEventListener('click', downloadCut);

            // Initial UI
            setUiForRecording(false);
        })();
    </script>
</body>
</html>
